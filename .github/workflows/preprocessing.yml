name: Automated Data Preprocessing

on:
  push:
    branches: [main]
    paths:
      - "breast_cancer_raw.csv"
      - "preprocessing/automate_Mohamad-Ikhsan-Haidar.py"
  workflow_dispatch: {}

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      - name: Run automated preprocessing
        working-directory: preprocessing
        run: |
          python automate_Mohamad-Ikhsan-Haidar.py --input ../breast_cancer_raw.csv --output breast_cancer_preprocessing
      - name: Commit and push preprocessed dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/breast_cancer_preprocessing/*.csv
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [automated]"
          git push
